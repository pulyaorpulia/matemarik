<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
</head>
<body>

<h2>Chat</h2>

<!-- 🔴 LOGOUT BUTTON -->
<form method="post" action="/logout/">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

<hr>

<div id="chat-box">
    {% for message in messages %}
        <div>
            <b>{{ message.sender.username }}</b>:
            {{ message.text }}

            {% if message.image %}
                <br>
                <img src="{{ message.image.url }}" width="200">
            {% endif %}
        </div>
    {% endfor %}
</div>

<hr>

<form id="chat-form" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="text" placeholder="Message">
    <input type="file" name="image">

    <button type="submit">Send</button>
</form>

<script>
const form = document.getElementById('chat-form');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    let formData = new FormData(form);

    fetch('/chat/send/', {   // ✅ TO‘G‘RI URL
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) return;

        let chatBox = document.getElementById('chat-box');

        let msg = `<div>
            <b>${data.sender}</b>: ${data.text || ''}
            ${data.image ? `<br><img src="${data.image}" width="200">` : ''}
        </div>`;

        chatBox.innerHTML += msg;
        form.reset();
    });
});


// 🔄 AUTO REFRESH (FIX QILINDI)
setInterval(() => {
    fetch('/chat/')
    .then(res => res.text())
    .then(html => {
        let newDoc = new DOMParser().parseFromString(html, 'text/html');
        document.getElementById('chat-box').innerHTML =
            newDoc.getElementById('chat-box').innerHTML;
    });
}, 3000);

</script>

</body>
</html>
